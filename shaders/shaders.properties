# Bu pack sabit, hazir bir kalite seviyesiyle gelir.
# Ayarlanabilir sis mesafesi, pastel yogunluk vb. gibi
# tekil secenekler Iris'in kendi Shader Options ekraninda
# otomatik olarak listelenir (settings.glsl icindeki
# const int / const float degerlerinden).

option.FOG_DISTANCE.comment     = Kac chunk sonrasi sis gizlesin?
option.PASTEL_STRENGTH.comment  = Pastel efekt yogunlugu
option.FOG_COLOR_PRESET.comment = (kullanilmiyor - renkler otomatik, gunun saatine gore degisir)
option.BLOOM_STRENGTH.comment   = Bloom yogunlugu
option.SATURATION.comment       = Renk doygunlugu
option.BRIGHTNESS.comment       = Sahne parlakligi
option.SHADOW_BIAS.comment      = Golge izi onleme degeri

option.PASTEL_STRENGTH.0 = Kapali
option.PASTEL_STRENGTH.1 = Hafif
option.PASTEL_STRENGTH.2 = Orta
option.PASTEL_STRENGTH.3 = Yogun
